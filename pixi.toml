[workspace]
authors = ["Conor Bronsdon <cmbronsdon@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "mojo-html"
description = "Liberal HTML parser and readability-style text extractor in pure Mojo"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]
test = "mojo run -I src test/test_tokenizer.mojo && mojo run -I src test/test_extract.mojo"
demo = "mojo run -I src examples/extract_article.mojo test/data/substack_article.html"

[dependencies]
mojo = ">=1.0.0b3,<2"
